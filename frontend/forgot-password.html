<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStore | Şifremi Unuttum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #F5F7FA 0%, #E8EEF2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 42, 67, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 {
            color: #0F2A43;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .auth-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #0F2A43;
            outline: none;
            box-shadow: 0 0 0 3px rgba(15, 42, 67, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #F7941D;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #e08312;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .back-link {
            color: #0F2A43;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #F7941D;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <h2>Şifremi Unuttum 🔒</h2>
        <p>Hesabınıza kayıtlı e-posta adresinizi girin, size yeni bir şifre belirlemeniz için güvenli bir bağlantı
            gönderelim.</p>

        <form id="forgot-password-form" onsubmit="sendResetLink(event)">
            <div class="form-group">
                <label>E-posta Adresiniz</label>
                <input type="email" id="email" class="form-control" placeholder="ornek@mail.com" required>
            </div>
            <button type="submit" class="btn-primary" id="reset-btn">Sıfırlama Linki Gönder</button>
        </form>

        <a href="login.html" class="back-link">← Giriş Sayfasına Dön</a>

        <div id="message-box"
            style="margin-top:20px; font-weight:600; font-size: 0.9rem; display:none; padding: 10px; border-radius: 8px;">
        </div>
    </div>

    <script>
        async function sendResetLink(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('reset-btn');
            const msgBox = document.getElementById('message-box');

            btn.innerText = "Gönderiliyor...";
            btn.disabled = true;
            msgBox.style.display = "none";

            try {
                // Backend rotamıza isteği atıyoruz
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                msgBox.style.display = "block";

                if (response.ok) {
                    msgBox.style.backgroundColor = "#E8F5E9";
                    msgBox.style.color = "#2E7D32";
                    msgBox.innerText = "✅ Şifre sıfırlama linki e-postanıza gönderildi!";
                    document.getElementById('email').value = ''; // Formu temizle
                } else {
                    msgBox.style.backgroundColor = "#FFEBEE";
                    msgBox.style.color = "#C62828";
                    msgBox.innerText = "❌ " + (data.message || "E-posta bulunamadı.");
                    btn.innerText = "Sıfırlama Linki Gönder";
                    btn.disabled = false;
                }
            } catch (error) {
                msgBox.style.display = "block";
                msgBox.style.backgroundColor = "#FFEBEE";
                msgBox.style.color = "#C62828";
                msgBox.innerText = "❌ Sunucuya bağlanılamadı.";
                btn.innerText = "Sıfırlama Linki Gönder";
                btn.disabled = false;
            }
        }
    </script>
    <script src="footer.js"></script>
</body>

</html>
