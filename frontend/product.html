<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStore | Ürün Detayı</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: #F4F7F6;
            color: #333;
        }

        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 1005;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: #0F2A43;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #F7941D;
        }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #0F2A43;
        }

        .product-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .image-section {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: center;
            align-items: stretch;
            border: 1px solid #F0F0F0;
        }

        .main-media-container {
            width: 100%;
            min-height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            border-radius: 30px;
            border: 1px solid #F0F3F6;
            background: linear-gradient(180deg, #FFFFFF 0%, #F7FAFC 100%);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
            position: relative;
            isolation: isolate;
        }

        .main-media-trigger {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            background: transparent;
            padding: 0;
            cursor: zoom-in;
        }

        .main-image {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        .main-image.is-video {
            border-radius: 22px;
            background: #0B1220;
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 999px;
            background: rgba(15, 42, 67, 0.9);
            color: #FFFFFF;
            font-size: 1.8rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 14px 28px rgba(15, 42, 67, 0.22);
            transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
        }

        .gallery-nav:hover {
            background: #F7941D;
            transform: translateY(-50%) scale(1.06);
        }

        .gallery-nav.prev {
            left: 18px;
        }

        .gallery-nav.next {
            right: 18px;
        }

        .gallery-counter {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            padding: 7px 14px;
            border-radius: 999px;
            background: rgba(15, 42, 67, 0.78);
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            z-index: 2;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .info-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand {
            color: #0F2A43;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #222;
            margin: 0 0 15px 0;
            line-height: 1.3;
        }

        /* GERÇEK YILDIZLAR İÇİN STİLLER */
        .stars-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .star {
            color: #FFC107;
            font-size: 1.3rem;
        }

        .star-empty {
            color: #E0E0E0;
            font-size: 1.3rem;
        }

        .rating-text {
            font-size: 0.95rem;
            color: #666;
            font-weight: 500;
        }

        .price {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2E7D32;
            margin-bottom: 30px;
        }

        .description-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #EAEAEA;
            margin-bottom: 30px;
        }

        .description-title {
            font-weight: 700;
            color: #0F2A43;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .description-text {
            color: #555;
            line-height: 1.8;
            font-size: 1rem;
        }

        .description-text>*:first-child {
            margin-top: 0;
        }

        .description-text>*:last-child {
            margin-bottom: 0;
        }

        .description-text p,
        .description-text ul,
        .description-text ol,
        .description-text blockquote,
        .description-text h2,
        .description-text h3,
        .description-text h4 {
            margin: 0 0 14px;
        }

        .description-text h2 {
            color: #0F2A43;
            font-size: 1.45rem;
            line-height: 1.35;
        }

        .description-text h3 {
            color: #0F2A43;
            font-size: 1.22rem;
            line-height: 1.4;
        }

        .description-text h4 {
            color: #0F2A43;
            font-size: 1.08rem;
            line-height: 1.45;
        }

        .description-text ul,
        .description-text ol {
            padding-left: 22px;
        }

        .description-text li + li {
            margin-top: 6px;
        }

        .description-text blockquote {
            border-left: 4px solid #F7941D;
            padding: 12px 14px;
            border-radius: 0 12px 12px 0;
            background: rgba(247, 148, 29, 0.08);
            color: #0F2A43;
            font-weight: 600;
        }

        .btn-add-large {
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(15, 42, 67, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #0F2A43;
            color: white;
            border: none;
            padding: 20px;
        }

        .btn-buy-now {
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(247, 148, 29, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: white;
            color: #F7941D;
            border: 2px solid #F7941D;
            padding: 20px;
        }

        .btn-buy-now:hover {
            background: #F7941D;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(247, 148, 29, 0.3);
        }

        .gallery-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
            width: 100%;
            justify-content: center;
        }

        .gallery-thumbnail-button {
            width: 70px;
            height: 70px;
            background: #FFFFFF;
            padding: 4px;
            border-radius: 18px;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.6;
            transition: 0.3s ease;
            flex-shrink: 0;
        }

        .gallery-thumbnail-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-thumbnail-button.video-thumb {
            background: #0B1220;
            padding: 0;
        }

        .gallery-thumbnail-button.active,
        .gallery-thumbnail-button:hover {
            border-color: #F7941D;
            opacity: 1;
            transform: translateY(-2px);
        }

        .gallery-thumbnail-button:focus-visible {
            outline: 3px solid rgba(247, 148, 29, 0.24);
            outline-offset: 2px;
        }

        .gallery-thumbnail-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 14px;
        }

        .gallery-thumbnail-button.video-thumb .gallery-thumbnail-media {
            object-fit: cover;
            background: #0B1220;
        }

        .media-lightbox {
            position: fixed;
            inset: 0;
            background: rgba(7, 15, 28, 0.82);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px;
            z-index: 10050;
        }

        .media-lightbox.is-open {
            display: flex;
        }

        .media-lightbox-dialog {
            position: relative;
            max-width: min(92vw, 1120px);
            max-height: 90vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        .media-lightbox-close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            color: #FFFFFF;
            font-size: 1.7rem;
            line-height: 1;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .media-lightbox-body-shell {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-lightbox-body {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-lightbox-nav {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            border: none;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            color: #FFFFFF;
            font-size: 2.2rem;
            line-height: 1;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
        }

        .media-lightbox-nav:hover {
            background: rgba(247, 148, 29, 0.92);
            transform: scale(1.04);
        }

        .media-lightbox-nav:disabled {
            opacity: 0.25;
            cursor: default;
            transform: none;
        }

        .media-lightbox-counter {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(15, 42, 67, 0.82);
            color: #FFFFFF;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .media-lightbox-media {
            max-width: 100%;
            max-height: 88vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            border-radius: 20px;
            background: #FFFFFF;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        }

        .media-lightbox-media.is-video {
            width: min(92vw, 1120px);
            background: #000000;
        }

        .btn-add-large:hover {
            background: #1a4a76;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(15, 42, 67, 0.25);
        }

        /* --- ÜRÜN SORULARI (SATICIYA SOR) --- */
        .bottom-sections-wrapper {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
            border-top: 2px solid #F0F0F0;
            padding-top: 40px;
            align-items: start;
        }

        .qa-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #EAEAEA;
        }

        .qa-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0F2A43;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qa-card {
            padding: 20px;
            border: 1px solid #F0F0F0;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #FAFAFA;
        }

        .qa-q {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
        }

        .qa-a {
            padding-left: 28px;
            color: #555;
            line-height: 1.5;
            position: relative;
        }

        .qa-a::before {
            content: "↳";
            position: absolute;
            left: 5px;
            top: 0;
            color: #00897B;
            font-weight: bold;
        }

        .qa-form {
            background: #F4F7FA;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .qa-form textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 15px;
            font-family: inherit;
        }

        /* YORUMLAR BÖLÜMÜ STİLLERİ */
        .reviews-section {
            display: flex;
            flex-direction: column;
        }

        .reviews-title {
            font-size: 1.8rem;
            color: #0F2A43;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .review-form-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #EAEAEA;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .rating-select {
            display: flex;
            gap: 8px;
            font-size: 2rem;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .rating-select span {
            color: #E0E0E0;
            transition: 0.2s;
        }

        .rating-select span:hover,
        .rating-select span.active {
            color: #FFC107;
        }

        .review-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #DDD;
            border-radius: 10px;
            font-family: 'Inter';
            font-size: 1rem;
            margin-bottom: 15px;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
        }

        .review-upload-box {
            margin-bottom: 16px;
            padding: 16px;
            border: 1px dashed #D7DFE8;
            border-radius: 14px;
            background: #F8FBFF;
        }

        .review-upload-trigger {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid #D7DFE8;
            background: white;
            color: #0F2A43;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .review-upload-trigger:hover {
            border-color: #F7941D;
            color: #F7941D;
        }

        .review-upload-input {
            display: none;
        }

        .review-upload-hint {
            margin-top: 10px;
            color: #6B7280;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .review-preview-grid,
        .review-media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 110px));
            gap: 12px;
            margin-top: 14px;
        }

        .review-preview-item,
        .review-media-button {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #E5E7EB;
            background: white;
        }

        .review-media-button {
            padding: 0;
            cursor: pointer;
            width: 100%;
            border: 1px solid #E5E7EB;
        }

        .review-preview-thumb,
        .review-media-thumb {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
            background: #F3F6F9;
        }

        .review-preview-thumb.is-video,
        .review-media-thumb.is-video {
            background: #0B1220;
        }

        .review-preview-meta {
            padding: 8px 10px;
            background: white;
        }

        .review-preview-name {
            font-size: 0.78rem;
            color: #334155;
            font-weight: 600;
            line-height: 1.4;
            word-break: break-word;
        }

        .review-preview-remove,
        .review-media-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .review-preview-remove {
            border: none;
            background: rgba(15, 42, 67, 0.86);
            color: white;
            cursor: pointer;
        }

        .review-media-badge {
            background: rgba(15, 42, 67, 0.8);
            color: white;
        }

        .btn-submit-review {
            background: #F7941D;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-submit-review:hover {
            background: #e08312;
        }

        .review-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #F0F0F0;
            margin-bottom: 20px;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .reviewer-name {
            font-weight: 700;
            color: #0F2A43;
            font-size: 1.05rem;
        }

        .review-date {
            color: #888;
            font-size: 0.85rem;
        }

        .review-text {
            color: #444;
            line-height: 1.6;
        }

        .review-media-grid {
            margin-top: 16px;
        }

        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }

            .bottom-sections-wrapper {
                grid-template-columns: 1fr;
            }

            .main-media-container {
                min-height: 280px;
                padding: 8px;
            }

            .gallery-nav {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }

            .gallery-nav.prev {
                left: 10px;
            }

            .gallery-nav.next {
                right: 10px;
            }

            .gallery-counter {
                bottom: 10px;
                font-size: 0.74rem;
                padding: 6px 12px;
            }

            .media-lightbox {
                padding: 16px;
            }

            .media-lightbox-close {
                top: -8px;
                right: -4px;
            }

            .media-lightbox-dialog {
                gap: 10px;
            }

            .media-lightbox-nav {
                width: 42px;
                height: 42px;
                font-size: 1.65rem;
            }

            .media-lightbox-counter {
                bottom: 12px;
                font-size: 0.72rem;
                padding: 6px 12px;
            }

            /* Header: dikeyde de sığsın */
            header {
                padding: 10px 4%;
                flex-wrap: wrap;
                gap: 8px;
            }

            .logo {
                font-size: 1.5rem;
            }

            /* Arama çubuğu tam genişlikte */
            header>div:nth-child(2) {
                order: 3;
                width: 100%;
                margin: 0 !important;
            }

            header>div:nth-child(2) form {
                max-width: 100% !important;
            }

            /* Sağ menü butonları küçülsün */
            .nav-right {
                gap: 8px;
            }

            .welcome-text {
                display: none;
            }

            .btn-profile,
            .btn-logout {
                padding: 6px 10px;
                font-size: 0.82rem;
            }

            .btn-login {
                padding: 7px 14px;
                font-size: 0.85rem;
            }

            /* Sepet & çan butonu */
            .cart-btn {
                padding: 6px 10px;
                font-size: 1.2rem;
            }

            /* Kategori menüsü yatay kaydır */
            .category-nav {
                padding: 0 4%;
                justify-content: flex-start;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }

            .category-nav::-webkit-scrollbar {
                display: none;
            }

            .category-menu {
                white-space: nowrap;
                min-width: max-content;
            }

            .category-item {
                padding: 10px 14px;
                font-size: 0.88rem;
            }
        }

        /* SAĞ MENÜ (KULLANICI VE SEPET) */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }

        .welcome-text {
            color: #555;
            font-weight: 500;
        }

        .welcome-text strong {
            color: #0F2A43;
        }

        .btn-profile {
            background: #F0F4F8;
            color: #0F2A43;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-profile:hover {
            background: #E2E8F0;
        }

        .btn-logout {
            background: #FFF0F0;
            color: #E53935;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #FFE0E0;
        }

        .btn-login {
            background: #0F2A43;
            color: white;
            padding: 10px 20px;

        .subcategory-item:hover {

            color: #0F2A43;
        }
    </style>
</head>

<body>

    <div id="mobile-tip-banner">
        <span class="tip-icon">⋮</span>
        <span class="tip-text">Daha iyi bir görünüm için sağ üstteki <strong>⋮</strong> menüsünden <strong>"Masaüstü sitesi"</strong> seçeneğini aktif edin.</span>
        <button class="tip-close" onclick="dismissMobileTip()" aria-label="Kapat">✕</button>
    </div>
    <div id="media-lightbox" class="media-lightbox" aria-hidden="true" onclick="handleMediaLightboxBackdrop(event)">
        <div class="media-lightbox-dialog">
            <button type="button" class="media-lightbox-close" aria-label="Kapat" onclick="closeMediaLightbox(event)">&times;</button>
            <button id="media-lightbox-prev" type="button" class="media-lightbox-nav" data-lightbox-direction="-1" aria-label="Önceki görsel" hidden>&lsaquo;</button>
            <div class="media-lightbox-body-shell">
                <div id="media-lightbox-body" class="media-lightbox-body"></div>
                <div id="media-lightbox-counter" class="media-lightbox-counter" hidden></div>
            </div>
            <button id="media-lightbox-next" type="button" class="media-lightbox-nav" data-lightbox-direction="1" aria-label="Sonraki görsel" hidden>&rsaquo;</button>
        </div>

    <script>
        (function () {
            var dismissed = localStorage.getItem('nova_mobile_tip_dismissed');
            if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) {
                var el = document.getElementById('mobile-tip-banner');
                if (el) el.style.display = 'none';
            }
        })();
        function dismissMobileTip() {
            document.getElementById('mobile-tip-banner').style.display = 'none';
            localStorage.setItem('nova_mobile_tip_dismissed', Date.now().toString());
        }
    </script>

    <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>🛍️ Sepetim</h2>

        <div class="cart-footer">

            <button class="btn-checkout" id="btn-checkout" onclick="proceedToCheckout()">Ödemeye
                Geç</button>
        </div>
    </div>

    <header>
        <a href="index.html" class="logo">Nova<span>Store</span></a>

        <div style="flex: 1; display: flex; justify-content: center; margin: 0 20px;">
            <form action="index.html" method="GET"
                style="display: flex; align-items: center; background: #ffff; border-radius: 20px; padding: 4px 12px; border: 1px solid #EAEAEA; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); height: 42px; width: 100%; max-width: 500px;">
                <input type="text" name="search" placeholder="Ürün Ara..."
                    style="flex: 1; border: none; background: transparent; padding: 5px 10px; outline: none; font-size: 0.95rem; color: #333;"
                    required>
                <button type="submit"
                    style="background: transparent; border: none; cursor: pointer; color: #0F2A43; font-size: 1.1rem; display: flex; align-items: center; padding: 0 5px;"><svg
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>

        <div class="nav-right">
            <div id="user-menu" class="user-menu"></div>

            <button class="cart-btn" onclick="openCart()"
                style="position: relative; background: transparent; box-shadow: none; color: #0F2A43; padding: 5px 10px; border: 1px solid #E0E0E0; border-radius: 12px; font-size: 1.5rem;">
                🛒
                <span class="cart-badge" id="cart-count"
                    style="background: #F7941D; color: white; margin-left: -5px; font-size: 0.9rem;">0</span>
            </button>
        </div>
    </header>

    <nav class="category-nav" id="category-nav">
        <ul class="category-menu" id="category-menu">
            <!-- Kategoriler JS ile buraya yüklenecek -->
        </ul>
    </nav>

    <div class="product-container" id="product-detail-area">
        <h2 style="text-align: center; width: 100%; grid-column: 1 / -1;">Ürün aranıyor...</h2>
    </div>

    <script>
        // --- 1. KULLANICI KİMLİK KONTROLÜ ---
        function checkUserStatus() {
            const token = localStorage.getItem('nova_user_token');
            const userInfoStr = localStorage.getItem('nova_user_info');
            const userMenu = document.getElementById('user-menu');

            if (token && userInfoStr) {
                const user = JSON.parse(userInfoStr);
                userMenu.innerHTML = `
                    <span class="welcome-text">Merhaba, <strong>${user.fullName.split(' ')[0]}</strong></span>
                    <a href="profile.html" class="btn-profile">👤 Hesabım</a>
                    <button onclick="userLogout()" class="btn-logout">Çıkış</button>
                `;
            } else {
                userMenu.innerHTML = `
                    <a href="login.html" class="btn-login">Giriş Yap / Kayıt Ol</a>
                `;
            }
        }

        function userLogout() {
            const uid = _getUserId();
            localStorage.removeItem(`novastore_checkout_${uid}`);
            localStorage.removeItem('nova_user_token');
            localStorage.removeItem('nova_user_info');
            window.location.reload();
        }

        // --- FAVORİ SİSTEMİ ---
        function toggleFavorite(btn, event, productId) {
            event.preventDefault();
            event.stopPropagation();
            btn.classList.toggle('active');
            let favs = JSON.parse(localStorage.getItem(_favsKey())) || [];
            if (btn.classList.contains('active')) {
                if (!favs.includes(productId)) favs.push(productId);
            } else {
                favs = favs.filter(id => id !== productId);
            }
            localStorage.setItem(_favsKey(), JSON.stringify(favs));
        }

        // --- KULLANICIYA ÖZEL LOCALSTORAGE ANAHTARLARI ---
        function _getUserId() {
            try {
                const info = JSON.parse(localStorage.getItem('nova_user_info'));
                return info && info.id ? info.id : 'guest';
            } catch (e) { return 'guest'; }
        }
        function _cartKey() { return `novastore_cart_${_getUserId()}`; }
        function _favsKey() { return `novastore_favs_${_getUserId()}`; }
        function _checkoutKey() { return `novastore_checkout_${_getUserId()}`; }

        // --- 2. KUSURSUZ SEPET SİSTEMİ ---
        let cart = JSON.parse(localStorage.getItem(_cartKey())) || [];

        function openCart() {
            document.getElementById('cart-sidebar').classList.add('open');
            document.getElementById('cart-overlay').classList.add('open');
            renderCartUI();
        }

        function closeCart() {
            document.getElementById('cart-sidebar').classList.remove('open');
            document.getElementById('cart-overlay').classList.remove('open');
        }

        function renderCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');
            const badge = document.getElementById('cart-count');
            const checkoutBtn = document.getElementById('btn-checkout');

            container.innerHTML = '';
            let total = 0;
            let totalItems = 0;
            let selectedItemsCount = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty-msg">
                        <span style="font-size: 3rem; display:block; margin-bottom:15px;">🛒</span>
                        Sepetiniz şu an bomboş.<br>Hemen ürün eklemeye başlayın!
                    </div>`;
                totalEl.innerText = "0.00";
                badge.innerText = "0";
                if (checkoutBtn) checkoutBtn.disabled = true;
                return;
            }

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                totalItems += item.quantity;

                let isChecked = item.selected !== false;
                if (isChecked) {
                    total += itemTotal;
                    selectedItemsCount += item.quantity;
                }

                const imageUrl = item.image || 'https://via.placeholder.com/80?text=Görsel+Yok';

                let priceSectionHtml = '';
                if (item.old_price && parseFloat(item.old_price) > parseFloat(item.price)) {
                    const discountRate = Math.round(((parseFloat(item.old_price) - parseFloat(item.price)) / parseFloat(item.old_price)) * 100);
                    priceSectionHtml = `
                        <div style="display: flex; flex-direction: column; gap: 4px; background: #FAFAFA; border: 1px solid #EAEAEA; border-radius: 8px; padding: 6px 8px; margin-top: 6px; width: fit-content;">
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span style="color: #00897B; font-size: 0.65rem; font-weight: 700; background: #E0F2F1; padding: 2px 4px; border-radius: 4px;">Sepete Özel</span>
                                <span style="color: #888; text-decoration: line-through; font-size: 0.7rem;">${parseFloat(item.old_price).toFixed(2)} TL</span>
                                <span style="background: #00897B; color: white; padding: 2px 4px; border-radius: 4px; font-weight: bold; font-size: 0.65rem;">%${discountRate}</span>
                            </div>
                            <div style="color: #00897B; font-weight: 800; font-size: 0.95rem; line-height: 1;">
                                ${parseFloat(item.price).toFixed(2)} <span style="font-size: 0.7rem; font-weight: 600;">TL</span>
                            </div>
                        </div>
                    `;
                } else {
                    priceSectionHtml = `
                        <div style="color: #0F2A43; font-weight: 800; font-size: 1rem; margin-top: 6px;">
                            ${parseFloat(item.price).toFixed(2)} <span style="font-size: 0.75rem; font-weight: 600;">TL</span>
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="cart-item" style="display: flex; align-items: stretch; gap: 10px; padding: 12px; background: #fff; border: 1px solid #EAEAEA; border-radius: 12px; margin-bottom: 15px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                        <div style="display:flex; align-items:center;">
                            <input type="checkbox" class="cart-item-checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCartItemSelection(${index})" style="width: 20px; height: 20px; cursor: pointer; accent-color: #00897B; flex-shrink: 0;">
                        </div>
                        
                        <img src="${imageUrl}" alt="${item.name}" style="width: 65px; height: 65px; object-fit: cover; border-radius: 8px; flex-shrink: 0; border: 1px solid #F0F0F0; align-self: center;">
                        
                        <div class="cart-item-info" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; padding-right: 24px;">
                            <div class="cart-item-title" style="font-weight: 600; color: #333; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${item.name}">${item.name}</div>
                            ${priceSectionHtml}
                        </div>

                        <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; flex-shrink: 0; min-width: 65px;">
                            <button class="remove-item" onclick="removeFromCart(${index})" title="Ürünü Sil" style="background: #FFF0F0; color: #E53935; border: none; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: absolute; top: 12px; right: 12px;">
                                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                            
                            <div style="display: flex; align-items: center; background: #F8F9FA; border: 1px solid #EAEAEA; border-radius: 6px; overflow: hidden; margin-top: auto;">
                                <button onclick="updateCartQuantity(${index}, -1)" style="border: none; background: transparent; cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #555;">-</button>
                                <span style="font-weight: 600; font-size: 0.9rem; width: 20px; text-align: center; color: #333;">${item.quantity}</span>
                                <button onclick="updateCartQuantity(${index}, 1)" style="border: none; background: transparent; cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #555;">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            totalEl.innerText = total.toFixed(2);
            badge.innerText = totalItems;
            if (checkoutBtn) checkoutBtn.disabled = selectedItemsCount === 0;
        }

        function updateCartQuantity(index, change) {
            if (cart[index]) {
                cart[index].quantity += change;
                if (cart[index].quantity <= 0) {
                    cart[index].quantity = 1;
                }
                localStorage.setItem(_cartKey(), JSON.stringify(cart));

        function normalizeProductDescriptionFontSize(node) {
            const styleValue = String(node.getAttribute('style') || '');
            const styleMatch = styleValue.match(/font-size\s*:\s*([^;]+)/i);
            if (styleMatch && styleMatch[1]) {
                const value = styleMatch[1].trim().toLowerCase();
                if (['0.9rem', '1rem', '1.15rem', '1.3rem'].includes(value)) return value;
            }

            const legacySize = String(node.getAttribute('size') || '').trim();
            if (legacySize === '2') return '0.9rem';
            if (legacySize === '3') return '1rem';
            if (legacySize === '4') return '1.15rem';
            if (legacySize === '5') return '1.3rem';
            return '';
        }

        function normalizeProductDescriptionTextAlign(node) {
            const alignAttr = String(node.getAttribute('align') || '').trim().toLowerCase();
            if (['left', 'center', 'right'].includes(alignAttr)) return alignAttr;

            const styleValue = String(node.getAttribute('style') || '');
            const styleMatch = styleValue.match(/text-align\s*:\s*([^;]+)/i);
            if (styleMatch && styleMatch[1]) {
                const value = styleMatch[1].trim().toLowerCase();
                if (['left', 'center', 'right'].includes(value)) return value;
            }

            return '';
        }

        function sanitizeProductDescriptionHtml(rawHtml) {
            const parser = new DOMParser();
            const parsed = parser.parseFromString(`<div>${String(rawHtml || '')}</div>`, 'text/html');
            const sourceRoot = parsed.body.firstElementChild;
            const safeRoot = document.createElement('div');

            function appendChildren(target, sourceNode) {
                Array.from(sourceNode.childNodes).forEach((child) => {
                    const cleanedChild = sanitizeNode(child);
                    if (!cleanedChild) return;
                    target.appendChild(cleanedChild);
                });
            }

            function sanitizeNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return document.createTextNode(node.textContent || '');
                }

                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return null;
                }

                let tagName = node.tagName.toUpperCase();
                if (tagName === 'B') tagName = 'STRONG';
                if (tagName === 'I') tagName = 'EM';
                if (tagName === 'DIV') tagName = 'P';
                if (tagName === 'FONT') tagName = 'SPAN';
                if (tagName === 'H1') tagName = 'H2';
                if (tagName === 'H5' || tagName === 'H6') tagName = 'H4';

                if (!PRODUCT_DESCRIPTION_ALLOWED_TAGS.has(tagName)) {
                    const fragment = document.createDocumentFragment();
                    appendChildren(fragment, node);
                    return fragment;
                }

                const element = document.createElement(tagName.toLowerCase());
                const fontSize = normalizeProductDescriptionFontSize(node);
                const textAlign = normalizeProductDescriptionTextAlign(node);

                if (fontSize && tagName === 'SPAN') {
                    element.style.fontSize = fontSize;
                }

                if (textAlign && ['P', 'H2', 'H3', 'H4', 'BLOCKQUOTE', 'UL', 'OL', 'LI', 'SPAN'].includes(tagName)) {
                    element.style.textAlign = textAlign;
                }

                appendChildren(element, node);

                if (tagName === 'SPAN' && !element.getAttribute('style') && !element.textContent.trim()) {
                    return null;
                }

                if (tagName === 'SPAN' && !element.getAttribute('style')) {
                    const fragment = document.createDocumentFragment();
                    appendChildren(fragment, element);
                    return fragment;
                }

                return element;
            }

            if (sourceRoot) {
                appendChildren(safeRoot, sourceRoot);
            }

            return safeRoot.innerHTML
                .replace(/<p><\/p>/g, '')
                .replace(/(<br>\s*){3,}/g, '<br><br>')
                .trim();
        }

        function getSafeProductDescriptionHtml(value) {
            const source = String(value || '');
            if (!source.trim()) {
                return '<p>Bu ürün için henüz bir açıklama girilmemiş.</p>';
            }

            if (/<[a-z][\s\S]*>/i.test(source)) {
                return sanitizeProductDescriptionHtml(source) || '<p>Bu ürün için henüz bir açıklama girilmemiş.</p>';
            }

            return convertStoredDescriptionToHtml(source) || '<p>Bu ürün için henüz bir açıklama girilmemiş.</p>';
        }

        function stripProductDescriptionHtml(value) {
            const parser = new DOMParser();
            const parsed = parser.parseFromString(`<div>${String(value || '')}</div>`, 'text/html');
            return String(parsed.body.textContent || '').replace(/\s+/g, ' ').trim();
        }

        // 1. ÜRÜN VE YORUMLARI ÇEKME
        async function fetchProductAndReviews() {
            if (!productId) {
                document.getElementById('product-detail-area').innerHTML = '<h2 style="color:red; text-align:center; grid-column: 1/-1;">Hata: Ürün bulunamadı!</h2>';
                return;
            }

            try {
                // Hem ürünü hem yorumları aynı anda beynimizden istiyoruz
                const reviewRequestHeaders = {};
                if (token) {
                    reviewRequestHeaders.Authorization = 'Bearer ' + token;
                }

                const [productRes, reviewsRes] = await Promise.all([
                    fetch('/api/products/' + productId),
                    fetch('/api/reviews/product/' + productId, { headers: reviewRequestHeaders })
                ]);

                if (!productRes.ok) throw new Error("Ürün bulunamadı.");

                const product = await productRes.json();
                const reviewData = await reviewsRes.json();

                const imageUrl = product.image_url || 'https://via.placeholder.com/500?text=Görsel+Yok';

                // Yıldızları Çizdirme Algoritması (Örn: 4 ortalama varsa 4 sarı, 1 gri yıldız)
                let avgStarsHtml = '';
                const avgRating = Math.round(reviewData.average);
                for (let i = 1; i <= 5; i++) {
                    avgStarsHtml += i <= avgRating ? '<span class="star">★</span>' : '<span class="star-empty">★</span>';
                }

                // Yorum Ekleme Formu
                const reviewPermission = reviewData.reviewPermission || {
                    canReview: false,
                    requiresAuth: !token,
                    code: token ? 'DELIVERY_REQUIRED' : 'AUTH_REQUIRED',
                    message: token
                        ? 'Bu ürüne yalnızca satın alıp siparişi teslim edilmiş müşteriler değerlendirme yapabilir.'
                        : 'Bu ürüne yorum yapabilmek ve puan verebilmek için giriş yapmalısınız.'
                };

                let reviewFormHtml = '';
                if (reviewPermission.canReview) {
                    reviewFormHtml = `
                        <div class="review-form-box">
                            <h3 style="margin-top:0; color:#0F2A43;">Ürünü Değerlendir</h3>
                            <div class="rating-select" id="star-selector">
                                <span onclick="setRating(1)">★</span>
                                <span onclick="setRating(2)">★</span>
                                <span onclick="setRating(3)">★</span>
                                <span onclick="setRating(4)">★</span>
                                <span onclick="setRating(5)">★</span>
                            </div>
                            <textarea id="review-comment" class="review-input" placeholder="Bu ürün hakkında ne düşünüyorsunuz? (Opsiyonel)"></textarea>
                            <div class="review-upload-box">
                                <label for="review-media-input" class="review-upload-trigger">📷 Gorsel veya Video Ekle</label>
                                <input
                                    id="review-media-input"
                                    class="review-upload-input"
                                    type="file"
                                    accept="image/*,video/mp4,video/webm,video/ogg,video/quicktime,.mov"
                                    multiple
                                    onchange="handleReviewMediaSelection(event)"
                                >
                                <div id="review-media-hint" class="review-upload-hint">En fazla 4 gorsel veya video ekleyebilirsiniz. Ilk kare yorum kartinda kucuk onizleme olarak gorunur.</div>
                                <div id="review-media-preview" class="review-preview-grid"></div>
                            </div>
                            <button onclick="submitReview()" class="btn-submit-review">Yorumu Gönder</button>
                        </div>
                    `;
                } else if (reviewPermission.requiresAuth) {
                    reviewFormHtml = `
                        <div class="review-form-box" style="text-align: center; background: #F8FBFF; border-color: #BBDEFB;">
                            <h3 style="color:#1565C0;">Değerlendirme Yapmak İster Misiniz?</h3>
                            <p style="color:#555; margin-bottom: 20px;">Bu ürüne yorum yapabilmek ve puan verebilmek için giriş yapmalısınız.</p>
                            <a href="login.html" class="btn-submit-review" style="text-decoration:none;">Giriş Yap / Kayıt Ol</a>
                        </div>
                    `;
                } else {
                    const reviewInfoTitle = reviewPermission.code === 'ALREADY_REVIEWED'
                        ? 'Bu Ürünü Zaten Değerlendirdiniz'
                        : 'Yalnızca Teslim Edilmiş Siparişler Değerlendirebilir';

                    reviewFormHtml = `
                        <div class="review-form-box" style="text-align: center; background: #FFF9F1; border-color: #F5C17C;">
                            <h3 style="color:#A55A00;">${reviewInfoTitle}</h3>
                            <p style="color:#555; margin-bottom: 0;">${reviewPermission.message || 'Bu ürün için şu anda değerlendirme bırakamazsınız.'}</p>
                        </div>
                    `;
                }

                // Yorum Listesini Oluşturma
                let reviewsListHtml = '';
                if (reviewData.reviews.length === 0) {
                    reviewsListHtml = '<p style="color:#888;">Henüz değerlendirme yapılmamış. İlk yorumu siz yapın!</p>';
                } else {
                    reviewData.reviews.forEach(r => {
                        let rStars = '';
                        for (let i = 1; i <= 5; i++) {
                            rStars += i <= r.rating ? '<span class="star" style="font-size:1rem;">★</span>' : '<span class="star-empty" style="font-size:1rem;">★</span>';
                        }
                        const rDate = new Date(r.created_at).toLocaleDateString('tr-TR');
                        const safeReviewerName = escapeHtml(r.full_name || 'Musteri');
                        const safeComment = escapeHtml(r.comment || '');
                        const reviewTextHtml = safeComment ? `<div class="review-text">${safeComment}</div>` : '';
                        const reviewMediaHtml = buildReviewMediaMarkup(r.media, `${r.full_name || 'Musteri'} yorumu`);

                        reviewsListHtml += `
                            <div class="review-card">
                                <div class="review-header">
                                    <div class="reviewer-name">${safeReviewerName}</div>
                                    <div class="review-date">${rDate}</div>
                                </div>
                                <div style="margin-bottom: 10px;">${rStars}</div>
                                ${reviewTextHtml}
                                ${reviewMediaHtml}
                            </div>
                        `;
                    });
                }

                // Galeri oluşturma
                currentProductMediaItems = normalizeProductMediaItems(product, imageUrl);
                currentProductMediaIndex = 0;

                let galleryHtml = '';
                if (currentProductMediaItems.length > 1) {
                    galleryHtml = '<div class="gallery-container">';
                    currentProductMediaItems.forEach((mediaItem, index) => {
                        const activeClass = index === currentProductMediaIndex ? 'active' : '';
                        const safeUrl = escapeHtmlAttribute(mediaItem.url);
                        const safeAlt = escapeHtmlAttribute(mediaItem.altText);

                        if (mediaItem.type === 'video') {
                            galleryHtml += `
                                <button type="button" class="gallery-thumbnail-button video-thumb ${activeClass}" data-media-index="${index}" aria-label="Gorsel ${index + 1}">
                                    <video src="${safeUrl}" class="gallery-thumbnail-media" muted playsinline preload="metadata"></video>
                                </button>
                            `;
                        } else {
                            galleryHtml += `
                                <button type="button" class="gallery-thumbnail-button ${activeClass}" data-media-index="${index}" aria-label="Gorsel ${index + 1}">
                                    <img src="${safeUrl}" class="gallery-thumbnail-media" alt="${safeAlt}">
                                </button>
                            `;
                        }
                    });
                    galleryHtml += '</div>';
                }

                const mainMediaTag = buildMainMediaMarkup(
                    currentProductMediaItems[currentProductMediaIndex],
                    currentProductMediaIndex,
                    currentProductMediaItems.length
                );

                // GERÇEK İNDİRİM ALGORİTMASI (YEŞİL VERSİYON)
                let priceHtml = '';
                if (product.old_price && parseFloat(product.old_price) > parseFloat(product.price)) {
                    const oldP = parseFloat(product.old_price);
                    const newP = parseFloat(product.price);
                    const discountRate = Math.round(((oldP - newP) / oldP) * 100);

                    priceHtml = `
                        <div style="display: inline-flex; gap: 15px; align-items: center; background: #FAFAFA; padding: 10px 15px; border-radius: 12px; border: 1px solid #F0F0F0; margin-bottom: 20px;">
                            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00897B; font-size: 0.85rem; font-weight: 800; line-height: 1.2; padding-right: 15px; border-right: 2px solid #E0E0E0;">
                                <span>Sepete</span>
                                <span>Özel</span>
                            </div>
                            <div style="display: flex; flex-direction: column; justify-content: center;">
                                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2px;">
                                    <span style="color: #777; text-decoration: line-through; font-size: 0.95rem;">${oldP.toFixed(2)} TL</span>
                                    <span style="background: #00897B; color: white; padding: 2px 8px; border-radius: 6px; font-weight: bold; font-size: 0.85rem;">%${discountRate} İndirim</span>
                                </div>
                                <div style="color: #00897B; font-weight: 800; font-size: 1.8rem; line-height: 1;">${newP.toFixed(2)} <span style="font-size: 1.1rem; font-weight: 600;">TL</span></div>
                            </div>
                        </div>
                    `;
                } else {
                    priceHtml = `
                        <div class="price" style="font-size: 1.8rem; margin-bottom: 20px;">${parseFloat(product.price).toFixed(2)} TL</div>
                    `;
                }

                // Favori kontrolü
                let favs = JSON.parse(localStorage.getItem(_favsKey())) || [];
                let isFav = favs.includes(product.id) ? 'active' : '';
                const safeDescriptionHtml = getSafeProductDescriptionHtml(product.description);
                const safeDescriptionText = stripProductDescriptionHtml(safeDescriptionHtml) || product.name;

                // EKRANI ÇİZİYORUZ
                document.getElementById('product-detail-area').innerHTML = `
                    <div class="image-section" style="flex-direction: column; position: relative;">
                        <!-- Detay Sayfası Favori Butonu (Varsayılan Style.css ölçüleri: 36x36px) -->
                        <button class="btn-favorite ${isFav}" onclick="toggleFavorite(this, event, ${product.id})" title="Favorilere Ekle">
                            <svg class="heart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                        </button>
                        <div id="main-media-container" class="main-media-container">
                            ${mainMediaTag}
                        </div>
                        ${galleryHtml}
                    </div>

                    <div class="info-section">
                        <div class="brand">NOVA STORE</div>
                        <h1 class="title">${product.name}</h1>
                        
                        <div class="stars-container">
                            <div>${avgStarsHtml}</div>
                            <div class="rating-text">${reviewData.average} (${reviewData.totalReviews} Değerlendirme)</div>
                        </div>

                        ${priceHtml}

                        <div class="description-box">
                            <div class="description-title">Ürün Açıklaması</div>
                            <div class="description-text">
                                ${safeDescriptionHtml}
                            </div>
                        </div>

                        <div style="display: flex; gap: 15px; margin-top: 10px;">
                            <button class="btn-add-large" style="flex: 1;" onclick="addToCart(${product.id}, '${product.name.replace(/'/g, "\\'")}', ${product.price}, '${imageUrl}', ${product.old_price ? `'${product.old_price}'` : 'null'})">
                                🛒 Sepete Ekle
                            </button>
                            
                            <button class="btn-buy-now" style="flex: 1;" onclick="buyNow(${product.id}, '${product.name.replace(/'/g, "\\'")}', ${product.price})">
                                ⚡ Şimdi Al
                            </button>
                        </div>
                    </div>

                    <div class="bottom-sections-wrapper">
                        <div class="reviews-section">
                            <h2 class="reviews-title">Müşteri Değerlendirmeleri</h2>
                            ${reviewFormHtml}
                            <div id="reviews-list">
                                ${reviewsListHtml}
                            </div>
                        </div>

                        <div class="qa-section" id="qa-container">
                            <h2 class="qa-title">💬 Satıcıya Sorulanlar</h2>
                            <div id="qa-form-area" style="display: none;">
                                <div class="qa-form">
                                    <h4 style="margin-top: 0; margin-bottom: 10px; color: #0F2A43;">Ürün Hakkında Soru Sor</h4>
                                    <textarea id="question-text" placeholder="Ürünle ilgili merak ettiklerinizi buraya yazabilirsiniz..."></textarea>
                                    <button class="btn-buy-now" style="width: auto; padding: 10px 20px;" onclick="submitQuestion()">Soruyu İlet</button>
                                </div>
                            </div>
                            <div id="qa-list" style="margin-top: 20px;">
                                <div style="text-align: center; color: #888;">Sorular yükleniyor...</div>
                            </div>
                        </div>
                    </div>
                `;

                // Kullanıcı giriş yapmışsa soru sorma formunu göster
                renderCurrentProductMedia();

                if (user && user.id) {
                    document.getElementById('qa-form-area').style.display = 'block';
                }

                if (reviewPermission.canReview) {
                    selectedReviewFiles = [];
                    renderReviewMediaPreviews();
                } else {
                    selectedReviewFiles = [];
                    revokeReviewPreviewUrls();
                }

                // Soru verilerini çek
                fetchProductQuestions();

                // JSON-LD Structured Data
                const existingLd = document.getElementById('product-jsonld');
                if (existingLd) existingLd.remove();
                const ldScript = document.createElement('script');
                ldScript.type = 'application/ld+json';
                ldScript.id = 'product-jsonld';
                const ldData = {
                    '@context': 'https://schema.org',
                    '@type': 'Product',
                    name: product.name,
                    description: safeDescriptionText,
                    image: currentProductMediaItems.length > 1
                        ? currentProductMediaItems.map((mediaItem) => mediaItem.url)
                        : (currentProductMediaItems[0]?.url || product.image_url || ''),
                    sku: String(product.id),
                    brand: { '@type': 'Brand', name: 'NovaStore' },
                    offers: {
                        '@type': 'Offer',
                        url: window.location.href,
                        priceCurrency: 'TRY',
                        price: parseFloat(product.price).toFixed(2),
                        availability: Number(product.stock) > 0
                            ? 'https://schema.org/InStock'
                            : 'https://schema.org/OutOfStock',
                        seller: { '@type': 'Organization', name: 'NovaStore' }
                    }
                };
                if (reviewData.totalReviews > 0) {
                    ldData.aggregateRating = {
                        '@type': 'AggregateRating',
                        ratingValue: reviewData.average,
                        reviewCount: reviewData.totalReviews
                    };
                }
                ldScript.textContent = JSON.stringify(ldData);
                document.head.appendChild(ldScript);

            } catch (error) {
                document.getElementById('product-detail-area').innerHTML = '<h2 style="color:red; text-align:center; grid-column: 1/-1;">Bağlantı Hatası: Sunucu çalışmıyor olabilir.</h2>';
            }
        }

        // GALERİ RESMİ DEĞİŞTİRME
        function changeMainMedia(index) {
            setCurrentProductMediaIndex(index);
        }

        // 2. YORUM FORMU İŞLEMLERİ (Sarı Yıldız Seçme Animasyonu)
        function setRating(rating) {
            selectedRating = rating;
            const stars = document.getElementById('star-selector').children;
            for (let i = 0; i < stars.length; i++) {
                if (i < rating) {
                    stars[i].classList.add('active');
                } else {
                    stars[i].classList.remove('active');
                }
            }
        }

        // 3. YORUMU VERİTABANINA GÖNDERME
        async function submitReview() {
            if (selectedRating === 0) {
                alert("Lütfen önce bir yıldız puanı seçin.");
                return;
            }

            const authToken = localStorage.getItem('nova_user_token');
            if (!authToken) {
                alert("Yorum yapmak için giriş yapmalısınız.");
                return;
            }

            const comment = document.getElementById('review-comment').value;
            const formData = new FormData();
            formData.append('productId', productId);
            formData.append('rating', selectedRating);
            formData.append('comment', comment);
            selectedReviewFiles.forEach((file) => formData.append('media', file));

            try {
                const response = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: buildApiHeaders(),
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    selectedReviewFiles = [];
                    revokeReviewPreviewUrls();
                    alert("✅ " + result.mesaj);
                    window.location.reload(); // Yorumu listeye eklemek için sayfayı tazele
                } else {
                    alert("❌ Hata: " + result.error);
                }
            } catch (error) {
                alert("Yorum gönderilirken sunucu hatası oluştu.");
            }
        }

        // 4. SATICIYA SORU SORMA (Q&A) İŞLEMLERİ
        async function fetchProductQuestions() {
            try {
                const response = await fetch(`/api/questions/product/${productId}`);
                const questions = await response.json();

                const qaList = document.getElementById('qa-list');
                if (response.ok) {
                    if (questions.length === 0) {
                        qaList.innerHTML = '<p style="color:#888;">Henüz bu ürün için sorulmuş bir soru yok. İlk soruyu siz sorun!</p>';
                    } else {
                        let html = '';
                        questions.forEach(q => {
                            const dateStr = new Date(q.answered_at || q.created_at).toLocaleDateString('tr-TR');
                            html += `
                                <div class="qa-card">
                                    <div class="qa-q">
                                        <span style="background: #EAEAEA; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; height: fit-content;">Soru</span>
                                        <div style="flex: 1;">
                                            <div>${q.question}</div>
                                            <div style="font-size: 0.75rem; color: #888; margin-top: 5px;">${q.user_name} - ${new Date(q.created_at).toLocaleDateString()}</div>
                                        </div>
                                    </div>
                                    <div class="qa-a">
                                        <div style="font-weight: 600; color: #00897B; margin-bottom: 5px; font-size: 0.85rem;">Satıcı Yanıtı <span style="color:#aaa; font-weight:normal; margin-left:10px;">${dateStr}</span></div>
                                        <div>${q.answer || '<em>Satıcı henüz yanıtlamadı.</em>'}</div>
                                    </div>
                                </div>
                            `;
                        });
                        qaList.innerHTML = html;
                    }
                }
            } catch (e) {
                document.getElementById('qa-list').innerHTML = '<p style="color:red;">Sorular yüklenirken hata oluştu.</p>';
            }
        }

        async function submitQuestion() {
            const token = localStorage.getItem('nova_user_token');
            if (!token) {
                alert("Soru sormak için giriş yapmalısınız.");
                return;
            }

            const qText = document.getElementById('question-text').value.trim();
            if (!qText) {
                alert("Lütfen sorunuzu yazın.");
                return;
            }

            try {
                const response = await fetch('/api/questions/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        question: qText
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("✅ " + result.mesaj);
                    document.getElementById('question-text').value = '';
                } else {
                    alert("❌ Hata: " + result.error);
                }
            } catch (error) {
                alert("Sorunuz gönderilirken sunucu hatası oluştu.");
            }
        }

        window.addEventListener('beforeunload', revokeReviewPreviewUrls);

        // Sayfa açıldığında çalıştır
        fetchProductAndReviews();
        document.addEventListener('DOMContentLoaded', () => {
            checkUserStatus();
            renderCartUI();
            fetchNavigationCategories();
        });
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <!-- Canlı Destek Modülü -->
    <script src="chat.js"></script>
    <script src="footer.js"></script>

</body>

</html>
