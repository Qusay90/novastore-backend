<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStore | Yeni Şifre Belirle</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #F5F7FA 0%, #E8EEF2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 42, 67, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 {
            color: #0F2A43;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .auth-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #0F2A43;
            outline: none;
            box-shadow: 0 0 0 3px rgba(15, 42, 67, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #1b5e20;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <h2>Yeni Şifre Belirle 🔑</h2>
        <p>Lütfen hesabınız için güvenli, yeni bir şifre oluşturun.</p>

        <form id="reset-password-form" onsubmit="updatePassword(event)">
            <div class="form-group">
                <label>Yeni Şifre</label>
                <input type="password" id="new-password" class="form-control" placeholder="En az 6 karakter" required
                    minlength="6">
            </div>
            <div class="form-group">
                <label>Yeni Şifre (Tekrar)</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="Şifrenizi tekrar girin"
                    required minlength="6">
            </div>
            <button type="submit" class="btn-primary" id="save-btn">Şifremi Güncelle</button>
        </form>

        <div id="message-box"
            style="margin-top:20px; font-weight:600; font-size: 0.9rem; display:none; padding: 10px; border-radius: 8px;">
        </div>
    </div>

    <script>
        // URL'den token'ı alıyoruz
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.querySelector('.auth-card').innerHTML = '<h2>❌ Hata!</h2><p>Geçersiz veya süresi dolmuş bir bağlantı kullandınız.</p><a href="forgot-password.html">Yeniden link isteyin</a>';
        }

        async function updatePassword(e) {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.getElementById('save-btn');
            const msgBox = document.getElementById('message-box');

            if (newPassword !== confirmPassword) {
                msgBox.style.display = "block";
                msgBox.style.backgroundColor = "#FFEBEE";
                msgBox.style.color = "#C62828";
                msgBox.innerText = "❌ Şifreler birbiriyle eşleşmiyor!";
                return;
            }

            btn.innerText = "Güncelleniyor...";
            btn.disabled = true;
            msgBox.style.display = "none";

            try {
                // Backend'e token ve yeni şifreyi yolluyoruz
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();
                msgBox.style.display = "block";

                if (response.ok) {
                    msgBox.style.backgroundColor = "#E8F5E9";
                    msgBox.style.color = "#2E7D32";
                    msgBox.innerHTML = "✅ Şifreniz başarıyla güncellendi! <br><br> <a href='login.html' style='color:#2E7D32;'>Buradan giriş yapabilirsiniz.</a>";
                    document.getElementById('reset-password-form').style.display = "none";
                } else {
                    msgBox.style.backgroundColor = "#FFEBEE";
                    msgBox.style.color = "#C62828";
                    msgBox.innerText = "❌ " + (data.message || "Bir hata oluştu.");
                    btn.innerText = "Şifremi Güncelle";
                    btn.disabled = false;
                }
            } catch (error) {
                msgBox.style.display = "block";
                msgBox.style.backgroundColor = "#FFEBEE";
                msgBox.style.color = "#C62828";
                msgBox.innerText = "❌ Sunucuya bağlanılamadı.";
                btn.innerText = "Şifremi Güncelle";
                btn.disabled = false;
            }
        }
    </script>
    <script src="footer.js"></script>
</body>

</html>
