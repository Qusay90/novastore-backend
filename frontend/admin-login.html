<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStore | Yönetici Girişi</title>
    <link rel="icon" type="image/png" href="novastore-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0F2A43;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            color: #0F2A43;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Inter';
            box-sizing: border-box;
        }

        .error-msg {
            color: #ff4757;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Yönetici Girişi</h2>
        <div id="error-message" class="error-msg"></div>
        <form id="login-form">
            <div class="form-group">
                <label>E-posta Adresi</label>
                <input type="email" id="email" required placeholder="admin@novastore.tr">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="password" required placeholder="•••••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 1.1rem;">Giriş
                Yap</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Token'ı tarayıcının dijital kasasına kaydet
                    localStorage.setItem('nova_admin_token', result.token);
                    window.location.href = 'admin.html'; // Panele geç
                } else {
                    errorDiv.innerText = result.error;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = "Sunucuya bağlanılamadı.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
